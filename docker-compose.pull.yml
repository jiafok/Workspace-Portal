# 使用预构建镜像快速部署（无需 clone 全部代码）
# 适用于只想快速运行的用户
# docker-compose -f docker-compose.pull.yml up -d

# 如果本地没有 docker-compose.yml，需要先创建 data 目录：
# mkdir data

services:
  workspace-portal:
    image: ghcr.io/jiafok/workspace-portal:latest
    container_name: workspace-portal
    ports:
      - "6066:6066"
    volumes:
      - ./data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - TZ=Asia/Shanghai
    restart: unless-stopped
