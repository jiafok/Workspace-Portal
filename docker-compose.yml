version: '3.8'

services:
  workspace-portal:
    build: .
    container_name: workspace-portal
    ports:
      - "6066:6066"
    volumes:
      - ./data:/app/data
      # Docker monitoring — NAS users may need: chmod 666 /var/run/docker.sock
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - TZ=Asia/Shanghai
    restart: unless-stopped
